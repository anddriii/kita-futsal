name: kita-futsal
services:
  order-service:
    container_name: order-service
    platform: linux/amd64
#    image: anddriii/order-service:1 // build ketika di server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    env_file:
      - .env
    volumes:
      - ./assets:/app/assets
networks:
  host:
    external: true
  local-network:
    driver: bridge