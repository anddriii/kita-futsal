name: kita-futsal
services:
  payment-service:
    container_name: payment-service
    platform: linux/amd64
#    image: anddriii/payment-service:1 // build ketika di server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    volumes:
      - ./assets:/app/assets
networks:
  host:
    external: true
  local-network:
    driver: bridge